name: build-sites
# rebuild trigger 2026-05-26 — top-level perms after a default reset
# made discover/checkout 403 (GITHUB_TOKEN had no contents:read).

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - '.github/workflows/build-sites.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/wbb

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WBB_PAT }}
      - id: list
        # Emit a JSON array of site slugs that contain a Dockerfile.
        run: |
          sites=$(ls sites | while read d; do
            [ -f "sites/$d/Dockerfile" ] && echo -n "\"$d\","
          done | sed 's/,$//')
          echo "matrix={\"site\":[${sites}]}" >> "$GITHUB_OUTPUT"
          echo "Discovered sites: [${sites}]"

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WBB_PAT }}
      # Shell-based buildx avoids docker/setup-buildx-action@v3 — its
      # codeload tarball persistently 404's for our runners (probably
      # regional CDN miss). GitHub runner ships docker + buildx already.
      - name: Log in to GHCR
        run: echo "${{ secrets.WBB_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build & push ${{ matrix.site }}
        run: |
          set -eu
          docker buildx create --use --name wbb-builder >/dev/null
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag "${{ env.IMAGE_PREFIX }}-${{ matrix.site }}:latest" \
            --tag "${{ env.IMAGE_PREFIX }}-${{ matrix.site }}:${{ github.sha }}" \
            "sites/${{ matrix.site }}"
