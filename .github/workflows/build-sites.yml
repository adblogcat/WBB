name: build-sites
# rebuild trigger 2026-05-26 — top-level perms after a default reset
# made discover/checkout 403 (GITHUB_TOKEN had no contents:read).

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - '.github/workflows/build-sites.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/wbb

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        # Emit a JSON array of site slugs that contain a Dockerfile.
        run: |
          sites=$(ls sites | while read d; do
            [ -f "sites/$d/Dockerfile" ] && echo -n "\"$d\","
          done | sed 's/,$//')
          echo "matrix={\"site\":[${sites}]}" >> "$GITHUB_OUTPUT"
          echo "Discovered sites: [${sites}]"

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.site }}
        uses: docker/build-push-action@v6
        with:
          context: sites/${{ matrix.site }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.site }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.site }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.site }}
          cache-to: type=gha,mode=max,scope=${{ matrix.site }}
