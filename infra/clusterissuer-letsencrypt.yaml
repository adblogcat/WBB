# Cluster-scoped Let's Encrypt issuer for wildcard certs.
# HTTP-01 challenge via ingress-nginx.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: gurgen.balayan17@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - http01:
          ingress:
            class: nginx
