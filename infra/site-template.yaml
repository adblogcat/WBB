# Per-site deployment template. Apply with `envsubst < site-template.yaml | kubectl apply -f -`
# Variables expected: SITE_SLUG, IMAGE_TAG (default: latest), DOMAIN_BASE (default: test.vibecrew.space)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${SITE_SLUG}
  namespace: webbugbench
  labels:
    app: ${SITE_SLUG}
    site: ${SITE_SLUG}
spec:
  replicas: 1
  selector:
    matchLabels: { app: ${SITE_SLUG} }
  template:
    metadata:
      labels: { app: ${SITE_SLUG} }
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/adblogcat/wbb-${SITE_SLUG}:${IMAGE_TAG}
          imagePullPolicy: Always
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 500m, memory: 384Mi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ${SITE_SLUG}
  namespace: webbugbench
spec:
  selector: { app: ${SITE_SLUG} }
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${SITE_SLUG}
  namespace: webbugbench
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  ingressClassName: nginx
  tls:
    - hosts: [${SITE_SLUG}.${DOMAIN_BASE}]
      secretName: ${SITE_SLUG}-tls
  rules:
    - host: ${SITE_SLUG}.${DOMAIN_BASE}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${SITE_SLUG}
                port: { number: 80 }
