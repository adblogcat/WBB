# Ground truth for kanban-board.test.vibecrew.space
# Each entry is an intentionally planted defect. The evaluator scores
# agent runs by matching reported bugs to these entries via match_predicate.

- id: KAN-001
  category: function
  severity: critical
  trigger: "Перетащите любую карточку из колонки 'Бэклог' в колонку 'В работе', затем обновите страницу (F5/Ctrl+R)."
  expected: "После reload карточка остаётся в новой колонке — позиция сохранена в localStorage."
  actual: "Карточка визуально переехала, но после reload возвращается в исходную колонку — drag-and-drop не персистится."
  match_predicate:
    keywords_any:
      - "drag"
      - "drop"
      - "перетаск"
      - "перемещ"
      - "localstorage"
      - "сохран"
      - "персист"
      - "persist"
      - "reload"
      - "refresh"
      - "возвращ"
      - "сбрасыв"
      - "не сохраняется"
      - "не сохранилось"
      - "обновлен"
    page_url_regex: "(/$|/board|/kanban)"

- id: KAN-002
  category: function
  severity: high
  trigger: "Кликните по любой карточке, в модальном окне измените исполнителя или метку, нажмите 'Сохранить'."
  expected: "Модальное окно закрывается после успешного сохранения."
  actual: "Изменения применяются, но модалка остаётся открытой — кнопка 'Сохранить' не закрывает окно."
  match_predicate:
    keywords_any:
      - "модал"
      - "modal"
      - "окно"
      - "dialog"
      - "popup"
      - "save"
      - "сохран"
      - "закр"
      - "close"
      - "не закрывается"
      - "остаётся открыт"
      - "после сохранения"
      - "handler"
      - "обработчик"
    page_url_regex: "(/$|/board|/kanban)"

- id: KAN-003
  category: data
  severity: high
  trigger: "Откройте редактирование карточки, измените заголовок (поле 'Заголовок'), нажмите 'Сохранить', закройте модалку."
  expected: "Заголовок карточки на доске обновляется на новый текст."
  actual: "Заголовок карточки на доске остаётся прежним — изменения title не персистятся (мутируется только локальный state модалки)."
  match_predicate:
    keywords_any:
      - "title"
      - "заголов"
      - "название"
      - "редактир"
      - "edit"
      - "не сохраняется"
      - "не применяется"
      - "не обновляется"
      - "state"
      - "локальн"
      - "local"
      - "updatecard"
      - "изменения теряются"
      - "теряются"
    page_url_regex: "(/$|/board|/kanban)"

- id: KAN-004
  category: function
  severity: medium
  trigger: "Над доской кликните по чипу 'Bug' (фильтр включается). Затем кликните по чипу 'Feature' — ожидается мульти-выбор."
  expected: "Активны оба фильтра одновременно, доска показывает карточки с метками Bug ИЛИ Feature."
  actual: "Активен только последний кликнутый чип — клик по второму сбрасывает первый. Мульти-выбор сломан."
  match_predicate:
    keywords_any:
      - "фильтр"
      - "filter"
      - "чип"
      - "chip"
      - "метк"
      - "label"
      - "multi"
      - "мульти"
      - "одновременно"
      - "toggle"
      - "переключ"
      - "сбрасыв"
      - "заменя"
      - "только один"
      - "single select"
    page_url_regex: "(/$|/board|/kanban)"

- id: KAN-005
  category: usability
  severity: medium
  trigger: "В любой колонке нажмите '+ Добавить карточку'."
  expected: "Создаётся карточка с дефолтными значениями (или модалка запрашивает поля) — исполнитель, метка, приоритет заданы."
  actual: "Новая карточка появляется с пустыми/undefined полями: нет аватара исполнителя, нет цветной метки, нет точки приоритета."
  match_predicate:
    keywords_any:
      - "добавить"
      - "add"
      - "новая карточка"
      - "создан"
      - "undefined"
      - "пуст"
      - "empty"
      - "placeholder"
      - "default"
      - "по умолчанию"
      - "assignee"
      - "исполнитель"
      - "без метки"
      - "без приоритет"
      - "missing fields"
    page_url_regex: "(/$|/board|/kanban)"

- id: KAN-006
  category: visual
  severity: low
  trigger: "Посмотрите на цвет точки приоритета у разных карточек (низкий/средний/высокий приоритет)."
  expected: "Точка приоритета окрашена по значению: например, зелёный для low, жёлтый для med, красный для high."
  actual: "Точка приоритета у всех карточек одного и того же серого цвета — визуальная индикация приоритета не работает."
  match_predicate:
    keywords_any:
      - "приоритет"
      - "priority"
      - "точк"
      - "dot"
      - "цвет"
      - "color"
      - "серый"
      - "gray"
      - "одинаков"
      - "не отличается"
      - "визуал"
      - "indicator"
      - "индикатор"
      - "conditional"
      - "static"
    page_url_regex: "(/$|/board|/kanban)"

# Deliberate non-bugs (false-positive bait):
# - "Сбросить фильтр" появляется только когда есть активный фильтр — это by design.
# - Drag-and-drop работает только между колонками, не для сортировки внутри колонки — спецификация.
# - Аватар содержит инициалы вместо картинки — намеренный упрощённый дизайн.
# - Колонки имеют фиксированную ширину (4 колонки на экран) — не bug.
