- id: AUTH-003
  category: data
  severity: critical
  trigger: Зарегистрируйте пользователя с email test@example.com и паролем A, выйдите
    из аккаунта, затем зарегистрируйте снова с тем же email и паролем B.
  expected: Вторая регистрация должна быть отклонена с ошибкой 'Пользователь с таким
    email уже существует'.
  actual: Второй signup перезаписывает запись в localStorage (wbb-auth-users) — старый
    пароль теряется без предупреждения.
