- id: AUTH-006
  category: visual
  severity: low
  trigger: На странице /signup быстро дважды кликните по кнопке 'Создать' с валидными
    данными.
  expected: После первого клика кнопка должна стать disabled и показывать loading-состояние
    (спиннер или текст 'Создаём...').
  actual: Кнопка не блокируется и не показывает индикатор загрузки — пользователь
    может кликнуть несколько раз подряд.
