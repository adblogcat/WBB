- id: AUTH-005
  category: function
  severity: medium
  trigger: Войдите в аккаунт, на странице /account нажмите 'Выйти', затем снова откройте
    /account.
  expected: После logout localStorage очищен, /account показывает гостя или редиректит
    на /login.
  actual: Кнопка 'Выйти' только делает router.push('/'), но wbb-auth-session не очищается
    — повторный заход на /account показывает старого пользователя (автологин).
