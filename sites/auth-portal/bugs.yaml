# Ground truth for auth-portal.test.vibecrew.space
# Iter#13: expanded keywords + dropped page_url_regex
#
# agent reports stamp url_at_time from state.page_url which lags
# behind actual navigation (bugs about /signup land with url="/").
# Keywords are distinctive enough alone.

- id: AUTH-001
  category: function
  severity: critical
  trigger: На странице /login введите любой email и заведомо неверный пароль, нажмите
    'Войти'.
  expected: Должна появиться ошибка вида 'Неверный email или пароль', переход на /account
    запрещён.
  actual: Логин принимает любой пароль и сразу открывает /account — проверка пароля
    отсутствует.
  match_predicate:
    keywords_any:
    - пароль
    - password
