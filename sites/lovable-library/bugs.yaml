# Ground truth for test-craft-library-quest.lovable.app (external reference site).
# 4 user-confirmed bugs. Required on every eval cycle per user directive.

- id: BUG-001
  category: function
  severity: high
  trigger: "Введите в поле поиска название книги или фамилию автора С ИЗМЕНЁННЫМ РЕГИСТРОМ — например, маленькими буквами вместо больших, или наоборот."
  expected: "Поиск должен быть регистронезависимым (case-insensitive) — 'tolkien', 'TOLKIEN' и 'Tolkien' дают одинаковый результат. Это REQ-001."
  actual: "Поиск работает только при точном совпадении регистра — нарушает REQ-001."
  match_predicate:
    keywords_any:
      - "регистр"
      - "case"
      - "case-sensitive"
      - "case sensitive"
      - "регистрозависим"
      - "регистронезависим"
      - "lowercase"
      - "uppercase"
      - "uppercase/lowercase"
      - "верхний регистр"
      - "нижний регистр"
      - "буквы"
      - "точное совпадение"
      - "tolower"
      - "toupper"
      - "lowercase"
      - "REQ-001"
      - "req-001"

- id: BUG-002
  category: data
  severity: high
  trigger: "Откройте каталог книг, примените любой фильтр по жанру и посчитайте отображаемое число книг — сравните с фактическим количеством карточек в списке."
  expected: "Счётчик должен точно соответствовать числу карточек после фильтрации. Это REQ-002."
  actual: "Число книг отображается некорректно — не совпадает с фактическим количеством после фильтрации по жанрам."
  match_predicate:
    keywords_any:
      - "счётчик"
      - "счетчик"
      - "счёт"
      - "счет"
      - "count"
      - "counter"
      - "число книг"
      - "количество книг"
      - "жанр"
      - "genre"
      - "фильтр"
      - "filter"
      - "filtering"
      - "не совпадает"
      - "не соответствует"
      - "mismatch"
      - "wrong number"
      - "wrong count"
      - "incorrect"
      - "некорректно"
      - "incorrect number"
      - "REQ-002"
      - "req-002"

- id: BUG-003
  category: function
  severity: high
  trigger: "Найдите в каталоге книгу с известным ISBN, скопируйте ISBN целиком и вставьте в поле поиска."
  expected: "Поиск по ISBN должен находить соответствующую книгу. Это REQ-001 (универсальный поиск)."
  actual: "Поиск по ISBN возвращает пустой результат — никакие книги не найдены. Нарушает REQ-001."
  match_predicate:
    keywords_any:
      - "ISBN"
      - "isbn"
      - "идентификатор"
      - "штрих"
      - "barcode"
      - "barcode-id"
      - "не находит"
      - "пустой результат"
      - "no results"
      - "ничего не найдено"
      - "empty result"
      - "не выводит"
      - "не работает поиск"
      - "поиск по ISBN"
      - "search by ISBN"
      - "REQ-001"
      - "req-001"

- id: BUG-004
  category: function
  severity: high
  trigger: "Сначала введите любой текст в поле поиска (например, название книги). Затем, не сбрасывая поиск, примените фильтр по году издания."
  expected: "Фильтр по году должен корректно сужать уже найденные результаты поиска. Это REQ-002."
  actual: "Фильтр по году не работает, когда активен поисковый запрос — результаты не фильтруются. Нарушает REQ-002."
  match_predicate:
    keywords_any:
      - "год"
      - "year"
      - "фильтр"
      - "filter"
      - "не работает"
      - "не применяется"
      - "doesn't work"
      - "does not work"
      - "поиск"
      - "search"
      - "одновременно"
      - "вместе"
      - "конфликт"
      - "active query"
      - "активный поиск"
      - "при поиске"
      - "вместе с поиском"
      - "комбинация"
      - "combined"
      - "interaction"
      - "REQ-002"
      - "req-002"

# Reference for the evaluator:
# REQ-001 = "Каталог должен поддерживать универсальный регистронезависимый поиск
#            по названию, автору и ISBN".
# REQ-002 = "Фильтры (жанр, год) должны корректно работать как в одиночку, так
#            и в комбинации с активным поисковым запросом и друг с другом".
