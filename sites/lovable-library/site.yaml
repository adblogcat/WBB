# External reference site — user-mandated as a permanent eval target.
# Lives on lovable.app (no-code hosted), not in our k8s, so we override the
# default `<slug>.test.vibecrew.space` URL composition. CLI reads `url:`
# from this file before falling back to the subdomain template.
url: https://test-craft-library-quest.lovable.app
notes: |
  Required on every WBB eval cycle per user directive. If lovable.app updates
  the hosted page and the GT bugs disappear, flag it explicitly — don't silently
  count zero matches as a pass.

goal: |
  Ниже приведены требования к системе поиска библиотеки. Используйте их для руководства при тестировании и выявления потенциальных проблем.

  Функциональность поиска книг (REQ-001):
  Пользователи должны иметь возможность искать книги по названию, автору или ISBN.
  Критерии приемки:
  - Поиск должен быть нечувствителен к регистру для названия, автора.
  - Должны поддерживаться частичные совпадения (например, поиск 'тест' должен находить 'Тестирование').
  - Пустой поиск должен отображать все книги.
  - Поиск должен выполняться только при вводе минимум 3 символов.
  - Результаты поиска должны обновляться в режиме реального времени по мере ввода пользователем.
  - При отсутствии книг в базе, соответствующих запросам, выводить сообщение: "Нет книг, соответствующих вашим критериям. Попробуйте изменить параметры поиска или фильтры."

  Фильтрация книг (REQ-002):
  Пользователи должны иметь возможность фильтровать книги по жанру, году и доступности.
  Критерии приемки:
  - Фильтр жанра должен отображать все доступные жанры из каталога книг.
  - Фильтр по году должен отображать все годы, присутствующие в каталоге книг.
  - Фильтр доступности должен иметь варианты 'Все', 'Доступные' и 'Недоступные'.
  - Фильтры должны комбинироваться с функцией поиска.
  - Несколько фильтров должны работать вместе (логика И, а не ИЛИ).

  Отображение книг (REQ-003):
  Книги должны отображаться в виде сетки карточек с соответствующей информацией.
  Критерии приемки:
  - Каждая карточка книги должна отображать: название, автора, год, жанр и статус доступности.
  - Карточки книг должны включать репрезентативное изображение.
  - Карточки должны иметь кнопку 'Подробнее' для просмотра дополнительной информации.
  - Сетка должна быть адаптивной и подстраиваться под разные размеры экранов.

  Целостность данных (REQ-004):
  Все данные о книгах должны быть точными и согласованными.
  Критерии приемки:
  - Номера ISBN должны быть уникальными для всех книг.
  - Все обязательные поля должны присутствовать для каждой книги (без нулевых значений).
  - Статус доступности должен точно отражать, можно ли взять книгу в библиотеке.
